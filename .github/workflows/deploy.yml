name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: radarimovel
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPO: radar
  WIF_PROVIDER: projects/967459289585/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions@radarimovel.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Job image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.job
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/job:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy radar-imovel-api \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:radar-db \
            --set-env-vars="PUBSUB_PROJECT_ID=${{ env.PROJECT_ID }},GCS_BUCKET_RAW=radar-raw,CLOUD_SQL_INSTANCE=${{ env.PROJECT_ID }}:${{ env.REGION }}:radar-db,DB_USER=postgres,DB_NAME=radar" \
            --set-secrets="DB_PASSWORD=db_password:latest,TELEGRAM_BOT_TOKEN=telegram_bot_token:latest,FIREBASE_CREDENTIALS_JSON=firebase_credentials_json:latest" \
            --project=${{ env.PROJECT_ID }}

      - name: Update collect_caixa Cloud Run Job image
        run: |
          JOB_FLAGS=(
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/job:${{ github.sha }}
            --region=${{ env.REGION }}
            --set-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:radar-db
            --set-env-vars="PUBSUB_PROJECT_ID=${{ env.PROJECT_ID }},GCS_BUCKET_RAW=radar-raw,CLOUD_SQL_INSTANCE=${{ env.PROJECT_ID }}:${{ env.REGION }}:radar-db,DB_USER=postgres,DB_NAME=radar"
            --set-secrets="DB_PASSWORD=db_password:latest,TELEGRAM_BOT_TOKEN=telegram_bot_token:latest,FIREBASE_CREDENTIALS_JSON=firebase_credentials_json:latest"
            --project=${{ env.PROJECT_ID }}
          )
          gcloud run jobs describe radar-collect-caixa --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} 2>/dev/null \
            && gcloud run jobs update radar-collect-caixa "${JOB_FLAGS[@]}" \
            || gcloud run jobs create radar-collect-caixa "${JOB_FLAGS[@]}"
